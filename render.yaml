databases:
  - name: studio3-db
    databaseName: studio3
    user: studio3
    plan: free
    region: oregon

services:
  - type: web
    name: studio3-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    preDeployCommand: "alembic upgrade head"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: studio3-db
          property: connectionString
      - key: REDIS_URL
        sync: false # paste the Internal Redis URL from your existing studio3-redis instance (Render dashboard → that instance → Connect)
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY_MINUTES
        value: "15"
      - key: SALT_ROUNDS
        value: "10"
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
